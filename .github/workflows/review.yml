name: Dispatch Clead Review

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'src/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post review-ready marker
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "<!-- clead-review-ready -->" \
            --repo ${{ github.repository }}
